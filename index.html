  const rows=map.trim().split('\n').map(r=>r.trim());
  const h=rows.length,w=rows[0].length;
  const c=document.createElement('canvas');c.width=w;c.height=h;
  const g=c.getContext('2d');
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){const col=pal[rows[y][x]];if(col){g.fillStyle=col;g.fillRect(x,y,1,1);}}
  return c;
}

let AC=null;
function initAudio(){if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}}
function tone(f0,f1,dur,type,vol){
  if(!AC)return;
  try{
    const t=AC.currentTime,o=AC.createOscillator(),g=AC.createGain();
    o.type=type;o.frequency.setValueAtTime(Math.max(20,f0),t);
    o.frequency.exponentialRampToValueAtTime(Math.max(20,f1),t+dur);
    g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.connect(g);g.connect(AC.destination);o.start(t);o.stop(t+dur+.02);
  }catch(e){}
}

  mouse.y=(e.clientY-r.top)*(cvs.height/r.height)/SCALE;
});
cvs.addEventListener('mousedown',e=>{
  initAudio();e.preventDefault();
  if(e.button===0){mouse.down=true;pressed.LMB=true;}
  if(e.button===2){mouse.rdown=true;pressed.RMB=true;}
});
addEventListener('mouseup',e=>{
  if(e.button===0)mouse.down=false;
  if(e.button===2)mouse.rdown=false;
});

/* ================= 地牢生成 ================= */
function genFloor(fl){
  enemies=[];projs=[];parts=[];texts=[];pickups=[];hazards=[];chests=[];pedestals=[];
  stairsObj=null;lockRoom=null;blizzard=null;
  // 串字型布局：房间沿蛇形路径一间连一间（出生→……→Boss），路径清晰不绕路
  map=new Uint8Array(MW*MH);rooms=[];
  const COLS=4,ROWS=3,CW=22,CH=16,RW=18,RH=12; // 统一大房间 18×12
  const path=[];
  for(let r=0;r<ROWS;r++){
    if(r%2===0)for(let c=0;c<COLS;c++)path.push([c,r]);
    else for(let c=COLS-1;c>=0;c--)path.push([c,r]);
  }
  const N=Math.min(10,path.length);
  for(let i=0;i<N;i++){
    const[cx,cy]=path[i];
    rooms.push({x:1+cx*CW+2,y:1+cy*CH+2,w:RW,h:RH,type:'combat',cleared:false,locked:false,discovered:false});
  }
  for(const r of rooms)for(let y=r.y;y<r.y+r.h;y++)for(let x=r.x;x<r.x+r.w;x++)map[y*MW+x]=1;
  for(let i=1;i<rooms.length;i++){ // 相邻房间之间的短走廊（蛇形路径上基本是直线）
    const a=rooms[i-1],b=rooms[i];
    let ax=a.x+(a.w>>1),ay=a.y+(a.h>>1),bx=b.x+(b.w>>1),by=b.y+(b.h>>1);
    for(let x=Math.min(ax,bx);x<=Math.max(ax,bx);x++){map[ay*MW+x]=1;map[(ay+1)*MW+x]=1;}
    for(let y=Math.min(ay,by);y<=Math.max(ay,by);y++){map[y*MW+bx]=1;map[y*MW+bx+1]=1;}
  }
  // 房间类型：链头=出生，链尾=Boss，中段随机挑 宝箱/商店
  const start=rooms[0];start.type='start';start.cleared=true;
  rooms[rooms.length-1].type='boss';
  const mid=[];for(let i=1;i<rooms.length-1;i++)mid.push(i);
  // 打乱
  for(let i=mid.length-1;i>0;i--){const j=ri(0,i);[mid[i],mid[j]]=[mid[j],mid[i]];}
  rooms[mid[0]].type='chest';rooms[mid[0]].cleared=true;
  rooms[mid[1]].type='shop';rooms[mid[1]].cleared=true;
  // 摆放宝箱与商店
  const cr=rooms[mid[0]];
  chests.push({x:(cr.x+cr.w/2)*T,y:(cr.y+cr.h/2)*T,open:false});
  const sr=rooms[mid[1]];
  const items=shopRoll();
  for(let i=0;i<3;i++)pedestals.push({x:(sr.x+sr.w/2+(i-1)*2.2)*T,y:(sr.y+sr.h/2)*T,item:items[i],sold:false});
  // 障碍物掩体（战斗/Boss房）：四周留3格环带保证连通，Boss房中心留空
  for(const R of rooms){
    if(R.type!=='combat'&&R.type!=='boss')continue;
    const n=ri(3,5);
    for(let i=0;i<n;i++){
      const ow=ri(1,2),oh=ri(1,2);
      const ox=R.x+3+ri(0,R.w-6-ow),oy=R.y+3+ri(0,R.h-6-oh);
      if(R.type==='boss'&&Math.abs(ox+ow/2-(R.x+R.w/2))<3.5&&Math.abs(oy+oh/2-(R.y+R.h/2))<3.5)continue;
      for(let y=oy;y<oy+oh;y++)for(let x=ox;x<ox+ow;x++)map[y*MW+x]=0;
    }
    // 炸药桶：挨打就爆，连锁殉爆，敌我皆伤
    const nb=R.type==='boss'?2:ri(2,3);
    for(let i=0;i<nb;i++){
      let bx,by,t=0;
      do{bx=(R.x+2+rnd(0,R.w-4))*T;by=(R.y+2+rnd(0,R.h-4))*T;t++;}while(solid(bx,by)&&t<20);
      if(t<20)enemies.push(makeBarrel(bx,by));
    }
  }
  run.defUsed=false; // 金身不灭：每层重置
  // 玩家落位
  const px=(start.x+start.w/2)*T,py=(start.y+start.h/2)*T;
  player.x=px;player.y=py;
  cam.x=clamp(px-VW/2,0,MW*T-VW);cam.y=clamp(py-VH/2,0,MH*T-VH);
  banner={txt:'—— 第 '+fl+' 层 ——',sub:fl>run.maxFloor?'新纪录！越深越强':'寻找并击败本层的Boss',t:2.6};
  if(fl>run.maxFloor)run.maxFloor=fl;
}
function shopRoll(){
  const pool=[
    {k:'heal',name:'治疗药剂',glyph:'药',desc:'回复全部生命',price:12},
    {k:'maxhp',name:'生命上限',glyph:'心',desc:'最大生命+1',price:25},
    {k:'dmg',name:'武器强化',glyph:'强',desc:'武器伤害+1',price:30},
    {k:'talent',name:'神秘卷轴',glyph:'卷',desc:'立即获得1次天赋选择',price:35},
  ];
  for(let i=pool.length-1;i>0;i--){const j=ri(0,i);[pool[i],pool[j]]=[pool[j],pool[i]];}
  return pool.slice(0,3);
}
function solid(px,py){
  if(lockRoom){
    const R=lockRoom;
    if(px<R.x*T+2||px>(R.x+R.w)*T-2||py<R.y*T+2||py>(R.y+R.h)*T-2)return true;
  }
  const tx=px/T|0,ty=py/T|0;
  if(tx<0||ty<0||tx>=MW||ty>=MH)return true;
  return map[ty*MW+tx]===0;
}
function moveEnt(e,dx,dy){
  const r=e.r;
  if(dx){const nx=e.x+dx;
    if(!solid(nx-r,e.y-r)&&!solid(nx+r,e.y-r)&&!solid(nx-r,e.y+r)&&!solid(nx+r,e.y+r))e.x=nx;}
  if(dy){const ny=e.y+dy;
    if(!solid(e.x-r,ny-r)&&!solid(e.x+r,ny-r)&&!solid(e.x-r,ny+r)&&!solid(e.x+r,ny+r))e.y=ny;}
}
function roomAt(x,y,shrink){
  const s=shrink||0;
  for(const r of rooms)
    if(x>r.x*T+s&&x<(r.x+r.w)*T-s&&y>r.y*T+s&&y<(r.y+r.h)*T-s)return r;
  return null;
}

function moveSpeed(){

function heal(n){const b=player.hp;player.hp=clamp(player.hp+n,0,player.maxhp);if(player.hp>b){fText(player.x,player.y-12,'+'+(player.hp-b),'#6ee87a');SFX.heart();}}

/* ================= 伤害结算 ================= */
function dmgEnemy(e,d,o){
  o=o||{};
  if(e.hp<=0)return;
  if(o.fromPlayer!==false){
    if(player.buffAtk>0)d*=2;
    if(e.slowT>0)d+=tc('I2');
  }
  d=Math.max(1,Math.round(d));
  e.hp-=d;e.flash=0.12;
  fText(e.x+rnd(-4,4),e.y-10,d,o.col||'#fff',d>=8?1.6:d>=4?1.25:1); // 大伤害数字放大
  const kb=(e.kbMul===undefined?1:e.kbMul);
  if(o.kx)e.vx+=o.kx*kb; if(o.ky)e.vy+=o.ky*kb;
  // 命中火花（沿击退方向喷溅，更有打击感）
  if(o.kx||o.ky){const a=Math.atan2(o.ky||0,o.kx||0);spark(e.x,e.y,a,o.col||'#fff',d>=4?7:4);}
  if(o.tags&&o.tags.includes('ice')){
    e.slowT=2+0.6*tc('I6');e.slowMul=clamp(0.5-0.09*tc('I6'),0.2,0.5);e.iceHits=(e.iceHits||0)+1;
    if(tc('I4')&&e.iceHits>=3&&!e.boss){e.frozen=2;e.iceHits=0;fText(e.x,e.y-16,'冻结!','#8ae0ff');}
  }
  if(o.tags&&o.tags.includes('fire')&&tc('P4')){e.burnT=2;e.burnD=tc('P4');}
  if(o.melee&&run.weapon==='hammer'&&tc('W6')&&!e.barrel){e.echoT=0.4;e.echoD=tc('W6');} // 余震
  burst(e.x,e.y,5,o.col||'#fff');
  if(e.hp<=0)killEnemy(e);
}
function killEnemy(e){
  e.dead=true;
  if(e.barrel){ // 炸药桶：殉爆——敌我皆伤 + 连锁引爆
    burst(e.x,e.y,18,'#ff9040');shake=Math.max(shake,5);SFX.boom();
    parts.push({x:e.x,y:e.y,vx:0,vy:0,life:0.25,size:30,col:'rgba(255,150,60,.45)',ring:true});
    for(const m of enemies)if(!m.dead&&m!==e&&dist(m.x,m.y,e.x,e.y)<30+m.r)
      dmgEnemy(m,3,{col:'#ffab60',kx:(m.x-e.x)*6,ky:(m.y-e.y)*6,tags:['fire']});
    if(dist(player.x,player.y,e.x,e.y)<30+player.r)damagePlayer(1,e.x,e.y,null);
    return;
  }
  run.kills++;
  burst(e.x,e.y,14,e.boss?'#ffd0ff':'#c0c0d0');
  SFX.poof();
  if(e.burnT>0&&tc('P6'))explodeAt(e.x,e.y,2,16); // 爆燃连锁：燃烧敌人死亡即爆炸
  if(e.poisonT>0&&tc('D6')){ // 毒爆：毒雾扩散
    burst(e.x,e.y,10,'#80e060');
    for(const m of enemies)if(!m.dead&&!m.barrel&&dist(m.x,m.y,e.x,e.y)<44){m.poisonT=2.5;m.poisonD=Math.max(1,e.poisonD||1);}
  }
  // 掉落
  const orbs=e.xp;
  for(let i=0;i<orbs;i++)pickups.push({t:'xp',x:e.x,y:e.y,vx:rnd(-60,60),vy:rnd(-60,60),v:1});
  const nc=ri(1,2)+(tc('G3')?ri(1,1+tc('G3')):0)+(e.boss?20:0);
  for(let i=0;i<nc;i++)pickups.push({t:'coin',x:e.x,y:e.y,vx:rnd(-70,70),vy:rnd(-70,70),v:1});
  if(Math.random()<(e.boss?1:0.10+0.08*tc('G6')))pickups.push({t:'heart',x:e.x,y:e.y,vx:rnd(-40,40),vy:rnd(-40,40),v:1});
  // 影舞：背刺击杀重置
  if(e.lastHitStealth&&tc('D5')){player.rollcd=0;player.stealth=1;fText(player.x,player.y-14,'影舞!','#b090ff');}
  if(e.boss)bossDie(e);
}
function bossDie(e){
  freeze=0.3;shake=10;SFX.die();
  run.pending+=2;
  banner={txt:e.name+' 被击败！',sub:'获得 2 次升级',t:3};
  // 清理残余小怪（给予掉落；炸药桶保留以免误伤玩家）
  for(const m of enemies)if(!m.dead&&!m.boss&&!m.barrel){m.hp=0;killEnemy(m);}
  const R=lockRoom||roomAt(e.x,e.y,0);
  if(R){R.cleared=true;R.locked=false;}
  lockRoom=null;
  // 无限模式：每个Boss死后都出现下行楼梯
  const br=rooms.find(r=>r.type==='boss');
  stairsObj={x:(br.x+br.w/2)*T,y:(br.y+br.h/2)*T};
}
/* 统一的格挡结算：接触/冲撞伤害(src=攻击者) 与 弹幕(src=null) 共用一条路径 */
function tryBlock(sx,sy,d,src){
  if(!player.blocking)return false;
  const ang=Math.atan2(sy-player.y,sx-player.x);
  if(Math.abs(angDiff(ang,player.aim))>=PI*0.45)return false;
  const perfect=tc('J5')&&player.blockT<0.25;
  SFX.block();shake=Math.max(shake,2);
  burst(player.x+Math.cos(ang)*8,player.y+Math.sin(ang)*8,8,'#ffd966');
  if(perfect){
    fText(player.x,player.y-16,'完美格挡!','#ffe066');
    for(const e of enemies)if(!e.dead&&dist(e.x,e.y,player.x,player.y)<44&&!e.boss){e.stun=1.5;fText(e.x,e.y-12,'晕','#ffe066');}
  }
  const refl=Math.ceil(d*(1+0.75*tc('J2'))*(perfect?2.5:1));
  if(src&&!src.dead)dmgEnemy(src,refl,{fromPlayer:true,col:'#ffd966',kx:Math.cos(ang)*120,ky:Math.sin(ang)*120});
  else projs.push({x:player.x,y:player.y,vx:Math.cos(ang)*180,vy:Math.sin(ang)*180,r:3,dmg:refl,type:'arcane',from:'p',life:1});
  if(tc('J4')>=2&&player.blockHealCd<=0){heal(1);player.blockHealCd=4;}
  return true;
}
function damagePlayer(d,sx,sy,src){
  if(state!=='play')return;
  if(player.inv>0||player.roll>0)return;
  if(tryBlock(sx,sy,d,src))return;
  if(player.armor>0){player.armor--;fText(player.x,player.y-12,'护甲!','#aab4c2');SFX.block();return;}
  if(player.shield>0){player.shield--;fText(player.x,player.y-12,'护盾!','#4ab8e8');SFX.block();return;}
  player.hp-=d;player.inv=0.9;shake=Math.max(shake,4);SFX.hurt();
  burst(player.x,player.y,10,'#e34a5a');
  if(player.stealth>0)player.stealth=0;
  if(player.hp<=0&&tc('G5')&&!run.defUsed){ // 金身不灭：每层一次免死
    run.defUsed=true;player.hp=1;player.inv=1.6;shake=Math.max(shake,9);
    fText(player.x,player.y-18,'金身不灭!','#ffe066');SFX.lvl();
    parts.push({x:player.x,y:player.y,vx:0,vy:0,life:0.4,size:40,col:'rgba(255,224,102,.5)',ring:true});
    return;
  }
  if(player.hp<=0){state='over';SFX.die();}
}

/* ================= 攻击 ================= */
let swing=null; // {t,dur,dir,rng,col,w}
function tryAttack(){
  if(player.cd>0||player.blocking||player.roll>0)return;
  const aim=player.aim,w=run.weapon;
  const stealthMul=(player.stealth>0&&tc('D2'))?3:1;
  const wasStealth=player.stealth>0;
  if(w==='hammer'){
    const rng=26*(1+0.2*tc('W3'));
    player.cd=0.85/(1+0.15*tc('W4'));
    swing={t:0,dur:0.2,dir:aim,rng,col:'#e0c080',wide:PI*1.5};
    SFX.swing();
    let hits=0;
    meleeHit(aim,rng,PI*1.5,3+tc('W2')+run.shopDmg,240,e=>{hits++;});
    if(hits>0){
      freeze=Math.max(freeze,0.045);shake=Math.max(shake,4);SFX.hit();
      if(tc('W1')&&player.shield<2)player.shield=Math.min(2,player.shield+hits); // 只涨不扣：不吞宝箱给的额外护盾
    }
    if(tc('W5'))projs.push({x:player.x,y:player.y,vx:Math.cos(aim)*150,vy:Math.sin(aim)*150,r:7,dmg:2+run.shopDmg,type:'shock',from:'p',life:0.65,pierce:true,hitSet:new Set()});
  }else if(w==='sword'){
    const low=player.hp*3<=player.maxhp;
    player.cd=0.22/((1+0.15*tc('B2'))*(low&&tc('B4')?1.4:1));
    if(gtime-(player.comboLast||0)>1.2)player.combo=0; // 停手1.2秒重置连击
    player.comboLast=gtime;
    player.combo=(player.combo||0)+1;
    let dmg=1+run.shopDmg+tc('B6');
    const third=tc('B3')&&player.combo%3===0;
    if(third)dmg*=2;
    swing={t:0,dur:0.13,dir:aim,rng:22,col:third?'#ffe066':'#cfe4f5',wide:PI*0.9};
    SFX.swing();
    let hits=0;
    meleeHit(aim,22,PI*0.9,dmg*stealthMul,90,e=>{
      hits++;
      if(tc('B1')){
        player.hitCnt++;
        const need=(low&&tc('B4'))?3:5;
        if(player.hitCnt>=need){player.hitCnt=0;heal(1);}
      }
    },{melee:true});
    if(hits>0)SFX.hit();
    if(tc('B5'))projs.push({x:player.x,y:player.y,vx:Math.cos(aim)*230,vy:Math.sin(aim)*230,r:5,dmg,type:'slash',from:'p',life:0.55,pierce:true,hitSet:new Set()});
  }else if(w==='mage'){
    const primary=tc('P1')?'fire':(tc('I1')?'ice':'arcane');
    const cost=primary==='fire'?15:primary==='ice'?12:6;
    if(player.mana<cost){fText(player.x,player.y-12,'法力不足','#8fb4ff');player.cd=0.25;return;}
    player.mana-=cost;
    if(primary==='arcane'){
      player.cd=0.32;SFX.shoot();
      projs.push({x:player.x,y:player.y,vx:Math.cos(aim)*200,vy:Math.sin(aim)*200,r:3,dmg:(1+run.shopDmg)*stealthMul,type:'arcane',from:'p',life:1.6});
    }else if(primary==='fire'){
      player.cd=0.5;SFX.fire();
      projs.push({x:player.x,y:player.y,vx:Math.cos(aim)*170,vy:Math.sin(aim)*170,r:4,dmg:(2+run.shopDmg)*stealthMul,type:'fire',from:'p',life:1.8});
    }else{
      player.cd=0.55;SFX.ice();
      const wdt=tc('I3');
      for(let seg=1;seg<=6;seg++){
        for(let row=-wdt;row<=wdt;row++){
          const perp=aim+PI/2;
          hazards.push({x:player.x+Math.cos(aim)*seg*15+Math.cos(perp)*row*13,
            y:player.y+Math.sin(aim)*seg*15+Math.sin(perp)*row*13,
            r:10,delay:seg*0.055,life:0.5,dmg:(1+run.shopDmg)*stealthMul,tags:['ice'],col:'#9fe0ff',kind:'ice'});
        }
      }
    }
  }else if(w==='ranger'){
    if(player.sub==='dagger'){
      player.cd=0.18;
      swing={t:0,dur:0.1,dir:aim,rng:16,col:'#c8f0c0',wide:PI*0.55};
      SFX.swing();
      let hits=0;
      meleeHit(aim,16,PI*0.6,(1+run.shopDmg)*stealthMul,60,e=>{
        hits++;
        if(tc('D4')){e.poisonT=2;e.poisonD=tc('D4');}
      },{melee:true,stealthHit:wasStealth});
      if(hits>0){SFX.hit();if(wasStealth&&tc('D2'))fText(player.x,player.y-16,'背刺!','#b090ff');}
      if(wasStealth)player.stealth=0;
    }
    // 弓在 mousedown/up 处理
  }
  if(wasStealth&&w!=='ranger')player.stealth=0;
}
function meleeHit(aim,rng,arc,dmg,kb,onHit,opts){
  for(const e of enemies){
    if(e.dead)continue;
    const dx=e.x-player.x,dy=e.y-player.y,d=Math.hypot(dx,dy)||1;
    if(d<rng+e.r&&Math.abs(angDiff(Math.atan2(dy,dx),aim))<arc/2){
      if(solid((player.x+e.x)/2,(player.y+e.y)/2))continue; // 隔墙不可击中
      e.lastHitStealth=!!(opts&&opts.stealthHit); // 必须在伤害结算前写入，否则击杀那一下读不到
      dmgEnemy(e,dmg,Object.assign({kx:dx/d*kb,ky:dy/d*kb,melee:true},opts||{}));
      if(onHit)onHit(e);
    }
  }
}
function releaseBow(){
  if(player.charge<0)return;
  const c=clamp(player.charge,0,1);
  player.charge=-1;
  if(player.cd>0)return;
  player.cd=0.2;
  const aim=player.aim;
  const stealthMul=(player.stealth>0&&tc('D2'))?3:1;
  const base=(c>=1?3:c>=0.5?2:1)+tc('A4')+run.shopDmg;
  const pierce=c>=1&&tc('A1')>0;
  const spd=240+140*c;
  const shots=[0];
  for(let i=1;i<=tc('A2');i++)shots.push(i%2?0.18*Math.ceil(i/2):-0.18*Math.ceil(i/2));
  shots.forEach((off,i)=>{
    projs.push({x:player.x,y:player.y,vx:Math.cos(aim+off)*spd,vy:Math.sin(aim+off)*spd,
      r:3,dmg:(i===0?base:Math.max(1,base-1))*stealthMul,type:'arrow',from:'p',life:1.3,pierce,bounce:pierce?0:tc('A6'),hitSet:new Set()});
  });
  SFX.shoot();
  if(c>=1&&tc('A5')){
    const rt=player.target,tx=rt?rt.x:player.x+Math.cos(aim)*90,ty=rt?rt.y:player.y+Math.sin(aim)*90;
    for(let i=0;i<5;i++)hazards.push({x:tx+rnd(-20,20),y:ty+rnd(-20,20),r:11,delay:0.45+i*0.07,life:0.4,dmg:2+run.shopDmg,tags:[],col:'#c8f0a0',kind:'rain'});
  }
  if(player.stealth>0){player.stealth=0;}
}
function explodeAt(x,y,dmg,base){
  const r=base*(1+0.3*tc('P3'));
  burst(x,y,16,'#ff9040');shake=Math.max(shake,3);SFX.boom();
  parts.push({x,y,vx:0,vy:0,life:0.22,size:r,col:'rgba(255,150,60,.35)',ring:true});
  for(const e of enemies){
    if(e.dead)continue;
    if(dist(e.x,e.y,x,y)<r+e.r)dmgEnemy(e,dmg,{tags:['fire'],col:'#ffab60'});
  }
}

/* ================= 敌人 ================= */
function makeEnemy(type,x,y){
  const fl=run.floor;
  const base={x,y,vx:0,vy:0,flash:0,dead:false,slowT:0,frozen:0,stun:0,burnT:0,burnAcc:0,poisonT:0,poisonAcc:0,iceHits:0,wt:0,wa:rnd(0,TAU),touchCd:0};
  const t={
    slime:{r:5,hp:3,spd:30,xp:2,touch:1,spr:sprSlime},
    bat:{r:4,hp:2,spd:56,xp:2,touch:1,spr:sprBat},
    skel:{r:5,hp:4,spd:24,xp:3,touch:1,spr:sprSkel,shootCd:rnd(1,2)},
    ghost:{r:5,hp:5,spd:21,xp:4,touch:1,spr:sprGhost,phase:true,kbMul:0.3},
    imp:{r:5,hp:4,spd:0,xp:4,touch:1,spr:sprImp,tpCd:rnd(1,2.5),shootCd:rnd(0.8,1.6)},
  }[type];
  // 怪物成长：越深血越厚、伤害越高、速度略快
  const hp=Math.max(1,Math.round((t.hp+(fl-1))*(1+(fl-1)*0.18)));
  const e=Object.assign(base,t,{type,maxhp:hp,hp,
    touch:t.touch+Math.floor((fl-1)/4),
    spd:t.spd*(1+Math.min(fl-1,10)*0.03),
    xp:t.xp+Math.floor((fl-1)/2)});
  return e;
}
function makeBarrel(x,y){
  return {x,y,vx:0,vy:0,r:4,hp:1,maxhp:1,type:'barrel',barrel:true,xp:0,touch:0,spd:0,
    spr:sprBarrel,flash:0,dead:false,slowT:0,frozen:0,stun:0,burnT:0,burnAcc:0,
    poisonT:0,poisonAcc:0,iceHits:0,wt:0,wa:0,touchCd:0,kbMul:0};
}
function spawnRoomEnemies(R){
  const fl=run.floor;
  const n=Math.min(14,4+fl+ri(0,2));
  const tables={1:[['slime',.6],['bat',.4]],
    2:[['slime',.35],['bat',.25],['skel',.25],['ghost',.15]],
    3:[['slime',.25],['bat',.2],['skel',.25],['ghost',.15],['imp',.15]]};
  const tab=tables[Math.min(fl,3)];
  for(let i=0;i<n;i++){
    let x,y,tries=0;
    do{x=(R.x+1.5+rnd(0,R.w-3))*T;y=(R.y+1.5+rnd(0,R.h-3))*T;tries++;}
    while(dist(x,y,player.x,player.y)<52&&tries<30);
    let r=Math.random(),ty=tab[0][0];
    for(const[nm,p]of tab){if(r<p){ty=nm;break;}r-=p;}
    const e=makeEnemy(ty,x,y);
    enemies.push(e);
    burst(x,y,8,'#7060a0');
  }
}
function spawnBoss(R){
  const fl=run.floor;
  const cx=(R.x+R.w/2)*T,cy=(R.y+R.h/2)*T;
  const defs=[
    {name:'史莱姆王',hp:60,spr:sprBoss1,ai:'slimeking',r:13},
    {name:'骸骨将军',hp:90,spr:sprBoss2,ai:'general',r:11},
    {name:'深渊巫妖',hp:130,spr:sprBoss3,ai:'lich',r:11},
  ];
  const cyc=(fl-1)%3,loop=Math.floor((fl-1)/3);
  const d=defs[cyc];
  const hp=Math.round(d.hp*(1+loop*0.9)); // 每循环一轮血量+90%
  const name=loop>0?('强化·'+d.name):d.name;
  enemies.push(Object.assign(makeEnemy('slime',cx,cy),{
    type:'boss',boss:true,name,ai:d.ai,spr:d.spr,r:d.r,
    hp,maxhp:hp,xp:12,touch:1,spd:26+loop*4,kbMul:0,phase:false,enraged:loop>0,
    st:'chase',t:2,z:0,split1:false,split2:false,ang:0,patCd:1.5,dashT:0,dashOnce:false,
  }));
  SFX.roar();shake=6;
  banner={txt:'⚔ '+name+' ⚔',sub:'击杀Boss必得2次升级',t:2.5};
}
function enemyUpdate(e,dt){
  if(e.flash>0)e.flash-=dt;
  // 持续伤害先结算：冻结/眩晕的敌人也要吃燃烧与中毒
  if(e.slowT>0)e.slowT-=dt;
  if(e.burnT>0){e.burnT-=dt;e.burnAcc+=dt;if(e.burnAcc>=1){e.burnAcc-=1;dmgEnemy(e,e.burnD,{fromPlayer:true,col:'#ff8040',kx:0,ky:0});if(e.dead)return;}}
  if(e.poisonT>0){e.poisonT-=dt;e.poisonAcc+=dt;if(e.poisonAcc>=1){e.poisonAcc-=1;dmgEnemy(e,e.poisonD,{fromPlayer:true,col:'#80e060',kx:0,ky:0});if(e.dead)return;}}
  if(e.echoT>0){e.echoT-=dt;if(e.echoT<=0){burst(e.x,e.y,6,'#e0c080');dmgEnemy(e,e.echoD,{fromPlayer:true,col:'#e0c080'});if(e.dead)return;}} // 余震
  if(e.barrel)return; // 炸药桶无AI（但DoT可以引爆它）
  // 异常状态
  if(e.frozen>0){e.frozen-=dt;e.vx*=0.8;e.vy*=0.8;return;}
  if(e.stun>0){e.stun-=dt;return;}
  const slowMul=e.slowT>0?(e.slowMul||0.5):1;
  // 击退惯性
  e.vx*=Math.pow(0.0008,dt);e.vy*=Math.pow(0.0008,dt);
  moveEnt(e,e.vx*dt,e.vy*dt);
  if(e.touchCd>0)e.touchCd-=dt;
  const hidden=player.stealth>0;
  const px=player.x,py=player.y;
  const dp=dist(e.x,e.y,px,py);
  const dirx=(px-e.x)/(dp||1),diry=(py-e.y)/(dp||1);
  if(e.boss){bossUpdate(e,dt,slowMul);return;}
  if(hidden){ // 失去目标：游荡
    e.wt-=dt;if(e.wt<=0){e.wt=rnd(0.5,1.2);e.wa=rnd(0,TAU);}
    moveEnt(e,Math.cos(e.wa)*e.spd*0.4*slowMul*dt,Math.sin(e.wa)*e.spd*0.4*slowMul*dt);
  }else if(e.type==='slime'){
    e.wa+=dt*3.2;
    const hop=Math.max(0,Math.sin(e.wa))*1.7;
    moveEnt(e,dirx*e.spd*hop*slowMul*dt,diry*e.spd*hop*slowMul*dt);
  }else if(e.type==='bat'){
    const wob=Math.sin(gtime*4+e.wa)*0.9;
    const a=Math.atan2(diry,dirx)+wob;
    moveEnt(e,Math.cos(a)*e.spd*slowMul*dt,Math.sin(a)*e.spd*slowMul*dt);
  }else if(e.type==='skel'){
    if(dp>110)moveEnt(e,dirx*e.spd*slowMul*dt,diry*e.spd*slowMul*dt);
    else if(dp<70)moveEnt(e,-dirx*e.spd*slowMul*dt,-diry*e.spd*slowMul*dt);
    e.shootCd-=dt;
    if(e.shootCd<=0){e.shootCd=1.9;
      projs.push({x:e.x,y:e.y,vx:dirx*115,vy:diry*115,r:2.5,dmg:1,type:'earrow',from:'e',life:2.4});
      SFX.shoot();}
  }else if(e.type==='ghost'){
    e.x+=dirx*e.spd*slowMul*dt;e.y+=diry*e.spd*slowMul*dt; // 穿墙
    if(lockRoom){e.x=clamp(e.x,lockRoom.x*T+6,(lockRoom.x+lockRoom.w)*T-6);e.y=clamp(e.y,lockRoom.y*T+6,(lockRoom.y+lockRoom.h)*T-6);}
  }else if(e.type==='imp'){
    e.tpCd-=dt;
    if(e.tpCd<=0&&lockRoom){e.tpCd=2.6;
      let tx,ty,tr=0;
      do{tx=(lockRoom.x+1.5+rnd(0,lockRoom.w-3))*T;ty=(lockRoom.y+1.5+rnd(0,lockRoom.h-3))*T;tr++;}while(solid(tx,ty)&&tr<20);
      if(tr<20){burst(e.x,e.y,8,'#e06050');e.x=tx;e.y=ty;burst(e.x,e.y,8,'#e06050');}}
    e.shootCd-=dt;
    if(e.shootCd<=0){e.shootCd=1.5;
      const a0=Math.atan2(diry,dirx);
      for(const off of[-0.25,0,0.25])
        projs.push({x:e.x,y:e.y,vx:Math.cos(a0+off)*120,vy:Math.sin(a0+off)*120,r:2.5,dmg:1,type:'bolt',from:'e',life:2});
      SFX.fire();}
  }
  // 接触伤害（隐身能骗过仇恨，但撞上游荡的敌人仍会受伤——防止影遁循环变成站桩无敌）
  if(e.touch&&e.touchCd<=0&&dp<e.r+player.r+1){
    e.touchCd=0.6;
    damagePlayer(e.touch,e.x,e.y,e);
  }
}
function bossUpdate(e,dt,slowMul){
  const px=player.x,py=player.y;
  const dp=dist(e.x,e.y,px,py)||1;
  const dirx=(px-e.x)/dp,diry=(py-e.y)/dp;
  e.t-=dt;
  if(e.ai==='slimeking'){
    if(e.hp<e.maxhp*2/3&&!e.split1){e.split1=true;splitSlimes(e,3);}
    if(e.hp<e.maxhp/3&&!e.split2){e.split2=true;splitSlimes(e,3);}
    if(e.st==='chase'){
      moveEnt(e,dirx*e.spd*slowMul*dt,diry*e.spd*slowMul*dt);
      if(e.t<=0){e.st='tele';e.t=0.55;}
    }else if(e.st==='tele'){
      if(e.t<=0){e.st='jump';e.t=0.5;e.sx=e.x;e.sy=e.y;e.jx=px;e.jy=py;}
    }else if(e.st==='jump'){
      const k=1-e.t/0.5;
      e.x=lerp(e.sx,e.jx,k);e.y=lerp(e.sy,e.jy,k);e.z=Math.sin(k*PI)*26;
      if(e.t<=0){e.z=0;shake=Math.max(shake,7);SFX.boom();
        burst(e.x,e.y,20,'#d080d8');
        parts.push({x:e.x,y:e.y,vx:0,vy:0,life:0.25,size:38,col:'rgba(200,110,220,.4)',ring:true});
        if(dist(px,py,e.x,e.y)<38+player.r)damagePlayer(1,e.x,e.y,e);
        // 落地震荡环形弹幕（狂暴态更密）
        const nb=e.enraged?12:8;
        for(let i=0;i<nb;i++){const a=i/nb*TAU;
          projs.push({x:e.x,y:e.y,vx:Math.cos(a)*105,vy:Math.sin(a)*105,r:2.5,dmg:1,type:'bolt',from:'e',life:2});}
        e.st='chase';e.t=e.enraged?1.6:2.1;}
    }
  }else if(e.ai==='general'){
    if(e.st==='chase'){
      moveEnt(e,dirx*e.spd*1.2*slowMul*dt,diry*e.spd*1.2*slowMul*dt);
      if(e.t<=0){
        const roll=Math.random();
        if(roll<0.4){e.st='aimdash';e.t=0.55;e.dx0=dirx;e.dy0=diry;e.dashLeft=e.enraged?1:0;}
        else if(roll<0.7){e.st='ring';e.t=0.3;e.ringWave=false;}
        else{e.st='summon';e.t=0.4;}
      }
    }else if(e.st==='aimdash'){
      const a=Math.atan2(py-e.y,px-e.x);e.dx0=Math.cos(a);e.dy0=Math.sin(a);
      if(e.t<=0){e.st='dash';e.t=0.34;e.dashOnce=false;SFX.swing();
        parts.push({x:e.x,y:e.y,vx:0,vy:0,life:0.2,size:10,col:'rgba(255,80,80,.5)'});}
    }else if(e.st==='dash'){
      moveEnt(e,e.dx0*300*dt,e.dy0*300*dt);
      if(!e.dashOnce&&dist(e.x,e.y,px,py)<e.r+player.r+3){e.dashOnce=true;damagePlayer(2,e.x,e.y,e);}
      if(e.t<=0){
        if((e.dashLeft||0)>0){e.dashLeft--;e.st='aimdash';e.t=0.28;} // 二连冲斩
        else{e.st='chase';e.t=rnd(1.2,1.8);}
      }
    }else if(e.st==='ring'){
      if(e.t<=0){
        const off=e.ringWave?PI/12:0;
        for(let i=0;i<12;i++){const a=i/12*TAU+off;
          projs.push({x:e.x,y:e.y,vx:Math.cos(a)*95,vy:Math.sin(a)*95,r:2.5,dmg:1,type:'bolt',from:'e',life:2.2});}
        SFX.fire();
        if(!e.ringWave&&e.enraged){e.ringWave=true;e.t=0.35;} // 狂暴：第二重错位弹环
        else{e.ringWave=false;e.st='chase';e.t=rnd(1.2,1.8);}
      }
    }else if(e.st==='summon'){
      if(e.t<=0){
        const skels=enemies.filter(m=>!m.dead&&m.type==='skel').length;
        if(skels<4&&lockRoom)for(let i=0;i<2;i++){
          const[px,py]=roomPos(e.x+rnd(-24,24),e.y+rnd(-24,24));
          const m=makeEnemy('skel',px,py);enemies.push(m);burst(m.x,m.y,8,'#d0d0b0');}
        e.st='chase';e.t=rnd(1.2,1.8);}
    }
  }else if(e.ai==='lich'){
    const enr=e.hp<e.maxhp*0.3;
    e.patCd-=dt*(enr?1.7:1);
    if(e.t<=0){ // 瞬移
      e.t=enr?2.6:4;
      burst(e.x,e.y,12,'#a070e0');
      if(lockRoom){let tx,ty,tr=0;
        do{tx=(lockRoom.x+1.5+rnd(0,lockRoom.w-3))*T;ty=(lockRoom.y+1.5+rnd(0,lockRoom.h-3))*T;tr++;}while(solid(tx,ty)&&tr<20);
        if(tr<20){e.x=tx;e.y=ty;}}
      burst(e.x,e.y,12,'#a070e0');SFX.stealth();
    }
    if(e.patCd<=0){
      e.patCd=enr?1.3:2;
      const pat=ri(0,3);
      if(pat===3){ // 诅咒法阵：在玩家周围落下预警AOE，短暂后爆发
        for(let i=0;i<(enr?5:3);i++){
          const ang=rnd(0,TAU),rr=rnd(0,40);
          hazards.push({x:px+Math.cos(ang)*rr,y:py+Math.sin(ang)*rr,r:22,delay:0.9,life:0.35,dmg:2,tags:[],col:'#c060ff',kind:'curse',fromE:true});
        }
        SFX.stealth();
      }else if(pat===0){ // 螺旋
        for(let i=0;i<10;i++){const a=e.ang+i*0.55;
          projs.push({x:e.x,y:e.y,vx:Math.cos(a)*(80+i*6),vy:Math.sin(a)*(80+i*6),r:2.5,dmg:1,type:'bolt',from:'e',life:2.4});}
        e.ang+=0.9;SFX.fire();
      }else if(pat===1){ // 扇形三连
        const a0=Math.atan2(py-e.y,px-e.x);
        for(let w=0;w<3;w++)for(const off of[-0.3,-0.15,0,0.15,0.3])
          projs.push({x:e.x,y:e.y,vx:Math.cos(a0+off)*(100+w*28),vy:Math.sin(a0+off)*(100+w*28),r:2.5,dmg:1,type:'bolt',from:'e',life:2.2});
        SFX.fire();
      }else{ // 召唤蝙蝠
        const bats=enemies.filter(m=>!m.dead&&m.type==='bat').length;
        if(bats<5&&lockRoom)for(let i=0;i<2;i++){
          const[px,py]=roomPos(e.x+rnd(-20,20),e.y+rnd(-20,20));
          const m=makeEnemy('bat',px,py);enemies.push(m);burst(m.x,m.y,6,'#8a63b3');}
      }
    }
    // 缓慢漂移远离玩家
    if(dp<70)moveEnt(e,-dirx*20*dt,-diry*20*dt);
  }
  // Boss接触伤害
  if(e.touchCd<=0&&e.st!=='jump'&&dist(e.x,e.y,px,py)<e.r+player.r+1){
    e.touchCd=0.7;damagePlayer(1,e.x,e.y,e);
  }
}
function splitSlimes(e,n){
  banner={txt:'史莱姆王分裂了！',sub:'',t:1.4};
  for(let i=0;i<n;i++){
    const[px,py]=roomPos(e.x+rnd(-20,20),e.y+rnd(-20,20));
    const m=makeEnemy('slime',px,py);
    enemies.push(m);burst(m.x,m.y,8,'#a445a8');
  }
}
/* 召唤物出生点钳制在锁定房间内，避免生成到墙里 */
function roomPos(x,y){
  if(lockRoom){
    x=clamp(x,lockRoom.x*T+8,(lockRoom.x+lockRoom.w)*T-8);
    y=clamp(y,lockRoom.y*T+8,(lockRoom.y+lockRoom.h)*T-8);
  }
  return[x,y];
}

/* ================= 天赋卡 ================= */
function genOffer(){
  const primaryTaken=TALENTS.some(t=>t.tag==='primary'&&tc(t.id)>0);
  const pool=[];
  for(const t of TALENTS){
    if(t.w!=='all'&&t.w!==run.weapon)continue;
    if(tc(t.id)>=t.max)continue;
    if(t.tag==='primary'&&primaryTaken)continue;
    if(t.req&&tc(t.req)===0)continue;
    pool.push(t);
  }
  const picks=[];
  while(picks.length<3&&pool.length){
    let tot=0;for(const t of pool)tot+=t.w==='all'?1:3;
    let r=Math.random()*tot,idx=0;
    for(let i=0;i<pool.length;i++){r-=pool[i].w==='all'?1:3;if(r<=0){idx=i;break;}}
    picks.push(pool[idx]);pool.splice(idx,1);
  }
  while(picks.length<3)picks.push(GOLD_CARD);
  return picks;
}
function applyTalent(t){
  SFX.card();
  if(t.id==='GOLD'){run.coins+=15;fText(player.x,player.y-14,'+15金币','#ffe066');}
  else{
    run.talents[t.id]=(run.talents[t.id]||0)+1;
    if(t.id==='G1'){player.maxhp++;heal(1);}
  }
  burst(player.x,player.y,12,'#ffe066');
}

/* ================= 交互 ================= */
function nearestInteract(){
  let best=null,bd=18;
  for(const c of chests)if(!c.open){const d=dist(player.x,player.y,c.x,c.y);if(d<bd){bd=d;best={t:'chest',o:c,hint:'按 E 开启宝箱'};}}
  for(const p of pedestals)if(!p.sold){const d=dist(player.x,player.y,p.x,p.y);if(d<bd){bd=d;best={t:'shop',o:p,hint:'按 E 购买 '+p.item.name+' ('+p.item.price+'金币)'};}}
  if(stairsObj){const d=dist(player.x,player.y,stairsObj.x,stairsObj.y);if(d<bd){bd=d;best={t:'stairs',o:stairsObj,hint:'按 E 下往第 '+(run.floor+1)+' 层'};}}
  return best;
}
function doInteract(it){
  if(it.t==='chest'){
    it.o.open=true;SFX.chest();
    const roll=ri(0,4);
    if(roll===0){heal(player.maxhp);banner={txt:'宝箱：生命完全恢复！',sub:'',t:2};}
    else if(roll===1){run.coins+=25;banner={txt:'宝箱：+25 金币！',sub:'',t:2};SFX.coin();}
    else if(roll===2){run.pending++;banner={txt:'宝箱：免费天赋！',sub:'',t:2};}
    else if(roll===3){player.buffAtk=30;banner={txt:'宝箱：狂暴 30 秒！',sub:'伤害翻倍',t:2};}
    else{player.shield=Math.min(3,player.shield+2);banner={txt:'宝箱：+2 层护盾！',sub:'',t:2};}
    burst(it.o.x,it.o.y,20,'#ffe066');
  }else if(it.t==='shop'){
    const p=it.o;
    if(run.coins<p.item.price){fText(player.x,player.y-14,'金币不足','#ff7070');return;}
    run.coins-=p.item.price;p.sold=true;SFX.buy();
    const k=p.item.k;
    if(k==='heal')heal(player.maxhp);
    else if(k==='maxhp'){player.maxhp++;heal(1);}
    else if(k==='dmg'){run.shopDmg++;fText(player.x,player.y-14,'武器强化+1','#ffb060');}
    else if(k==='talent')run.pending++;
    burst(p.x,p.y,12,'#ffe066');
  }else if(it.t==='stairs'){
    run.floor++;SFX.stairs();heal(1);
    genFloor(run.floor);
  }
}

/* ================= 主更新 ================= */
function update(dt){
  gtime+=dt;
  if(freeze>0){freeze-=dt;return;}
  if(state!=='play')return;
  run.time+=dt;
  const P=player;
  // 冷却
  P.cd=Math.max(0,P.cd-dt);P.inv=Math.max(0,P.inv-dt);
  P.rollcd=Math.max(0,P.rollcd-dt);P.blockHealCd=Math.max(0,P.blockHealCd-dt);
  P.stealth=Math.max(0,P.stealth-dt);P.buffAtk=Math.max(0,P.buffAtk-dt);
  if(run.weapon==='mage')P.mana=Math.min(P.maxmana,P.mana+20*dt);
  // 自动索敌：武器朝向最近的敌人；没有敌人时朝移动方向
  mouse.wx=mouse.x+cam.x;mouse.wy=mouse.y+cam.y;
  let tgt=null,td=260;
  for(const e of enemies){if(e.dead||e.barrel)continue;const d=dist(P.x,P.y,e.x,e.y);if(d<td){td=d;tgt=e;}}
  P.target=tgt;
  if(tgt)P.aim=Math.atan2(tgt.y-P.y,tgt.x-P.x);
  P.face=Math.cos(P.aim)>=0?1:-1;
  // 格挡
  const wantBlock=run.weapon==='hammer'&&tc('J1')&&mouse.rdown&&P.roll<=0;
  if(wantBlock&&!P.blocking){P.blockT=P.blockGap>=0.4?0:0.3;P.blockGap=0;} // 连点右键无法刷完美格挡窗口
  if(!wantBlock)P.blockGap+=dt;
  P.blocking=wantBlock;
  if(P.blocking)P.blockT+=dt;
  // 游侠切换武器
  if(pressed.RMB&&run.weapon==='ranger'){
    P.sub=P.sub==='bow'?'dagger':'bow';P.charge=-1;
    fText(P.x,P.y-14,P.sub==='bow'?'⇒ 弓':'⇒ 匕首','#c8f0c0');SFX.card();
  }
  // 移动
  let mx=(keys.KeyD||keys.ArrowRight?1:0)-(keys.KeyA||keys.ArrowLeft?1:0);
  let my=(keys.KeyS||keys.ArrowDown?1:0)-(keys.KeyW||keys.ArrowUp?1:0);
  const ml=Math.hypot(mx,my);
  if(ml>0){mx/=ml;my/=ml;P.rdx=mx;P.rdy=my;P.walk+=dt*8;if(!P.target)P.aim=Math.atan2(my,mx);}
  // 翻滚
  if(pressed.Space&&P.rollcd<=0&&P.roll<=0){
    P.roll=0.18;P.rollcd=0.7;SFX.stealth();
    if(ml===0){P.rdx=Math.cos(P.aim);P.rdy=Math.sin(P.aim);}
    burst(P.x,P.y,6,'#b0c0d0');
  }
  if(P.roll>0){
    P.roll-=dt;
    moveEnt(P,P.rdx*moveSpeed()*3.2*dt,P.rdy*moveSpeed()*3.2*dt);
    if(P.roll<=0&&run.weapon==='ranger'&&tc('D1')){P.stealth=1.5;SFX.stealth();}
  }else if(ml>0){
    moveEnt(P,mx*moveSpeed()*dt,my*moveSpeed()*dt);
  }
  // 攻击
  if(run.weapon==='ranger'&&P.sub==='bow'){
    if(mouse.down&&P.charge<0&&P.cd<=0)P.charge=0;
    if(P.charge>=0)P.charge=Math.min(1,P.charge+dt/(0.8/(1+0.35*tc('A3'))));
    if(!mouse.down&&P.charge>=0)releaseBow();
  }else if(mouse.down)tryAttack();
  if(swing){swing.t+=dt;if(swing.t>=swing.dur)swing=null;}
  // 键石计时器
  if(tc('P5')){P.meteorCd-=dt;
    if(P.meteorCd<=0){P.meteorCd=8;
      const mt=P.target,mtx=mt?mt.x:P.x+Math.cos(P.aim)*50,mty=mt?mt.y:P.y+Math.sin(P.aim)*50;
      hazards.push({x:mtx,y:mty,r:34*(1+0.3*tc('P3')),delay:0.7,life:0.3,dmg:4+run.shopDmg,tags:['fire'],col:'#ff8040',kind:'meteor'});}}
  if(tc('I5')){P.blizzCd-=dt;
    if(P.blizzCd<=0){P.blizzCd=7;blizzard={t:3,tick:0};SFX.ice();}}
  if(blizzard){
    blizzard.t-=dt;blizzard.tick-=dt;
    if(blizzard.tick<=0){blizzard.tick=0.5;
      for(const e of enemies)if(!e.dead&&dist(e.x,e.y,P.x,P.y)<62)
        dmgEnemy(e,1,{tags:['ice'],col:'#9fe0ff'});}
    if(blizzard.t<=0)blizzard=null;
  }
  // 飞剑
  updateSwords(dt);
  // 环火
  updateFireOrbs(dt);
  // 房间锁定
  const R=roomAt(P.x,P.y,8);
  if(R&&!R.discovered)R.discovered=true;
  if(R&&!R.cleared&&!R.locked&&(R.type==='combat'||R.type==='boss')){
    R.locked=true;lockRoom=R;
    if(R.type==='combat')spawnRoomEnemies(R);else spawnBoss(R);
    SFX.roar();
  }
  if(lockRoom&&enemies.every(e=>e.dead||e.barrel)){
    const LR=lockRoom;
    LR.cleared=true;LR.locked=false;lockRoom=null;
    if(LR.type==='combat'){
      run.coins+=5;fText(P.x,P.y-16,'清房 +5金币','#ffe066');SFX.coin();
      if(Math.random()<0.25)pickups.push({t:'heart',x:(LR.x+LR.w/2)*T,y:(LR.y+LR.h/2)*T,vx:0,vy:0,v:1});
    }
  }
  // 战斗开始时护甲
  if(lockRoom&&!lockRoom.armorGiven){lockRoom.armorGiven=true;player.armor=tc('J3');}
  // 敌人
  for(const e of enemies)if(!e.dead)enemyUpdate(e,dt);
  enemies=enemies.filter(e=>!e.dead);
  // 弹幕
  for(const p of projs){
    p.life-=dt;
    p.x+=p.vx*dt;p.y+=p.vy*dt;
    if(p.life<=0){p.dead=true;continue;}
    if(solid(p.x,p.y)){
      if(p.type==='fire')explodeAt(p.x,p.y,p.dmg,20);
      p.dead=true;continue;
    }
    if(p.from==='p'){
      for(const e of enemies){
        if(e.dead)continue;
        if(p.hitSet&&p.hitSet.has(e))continue;
        if(dist(p.x,p.y,e.x,e.y)<p.r+e.r){
          if(p.type==='fire'){explodeAt(p.x,p.y,p.dmg,20);p.dead=true;break;}
          dmgEnemy(e,p.dmg,{kx:p.vx*0.3,ky:p.vy*0.3,col:p.type==='arcane'?'#80d0ff':'#fff'});
          if(p.pierce){if(!p.hitSet)p.hitSet=new Set();p.hitSet.add(e);}
          else if(p.bounce>0){ // 弹射箭：转向附近未命中的敌人
            if(!p.hitSet)p.hitSet=new Set();p.hitSet.add(e);
            let nb=null,nd=110;
            for(const m of enemies)if(!m.dead&&!m.barrel&&!p.hitSet.has(m)){const dd=dist(p.x,p.y,m.x,m.y);if(dd<nd){nd=dd;nb=m;}}
            if(nb){const a=Math.atan2(nb.y-p.y,nb.x-p.x),sp=Math.hypot(p.vx,p.vy);p.vx=Math.cos(a)*sp;p.vy=Math.sin(a)*sp;p.bounce--;}
            else{p.dead=true;break;}
          }
          else{p.dead=true;break;}
        }
      }
    }else{
      if(dist(p.x,p.y,P.x,P.y)<p.r+P.r){
        if(P.roll>0||P.inv>0){}
        else if(tryBlock(p.x,p.y,p.dmg,null))p.dead=true;
        else{damagePlayer(p.dmg,p.x-p.vx*0.01,p.y-p.vy*0.01,null);p.dead=true;}
      }
    }
  }
  projs=projs.filter(p=>!p.dead);
  // 地面危害（冰川/陨石/箭雨）
  for(const hz of hazards){
    hz.delay-=dt;
    if(hz.delay<=0&&!hz.done){
      hz.done=true;
      if(hz.kind==='meteor'){burst(hz.x,hz.y,24,'#ff9040');shake=Math.max(shake,6);SFX.boom();
        parts.push({x:hz.x,y:hz.y,vx:0,vy:0,life:0.25,size:hz.r,col:'rgba(255,140,50,.4)',ring:true});}
      else if(hz.kind==='rain'){burst(hz.x,hz.y,8,'#c8f0a0');SFX.hit();}
      else if(hz.kind==='curse'){burst(hz.x,hz.y,14,'#c060ff');shake=Math.max(shake,4);SFX.boom();
        parts.push({x:hz.x,y:hz.y,vx:0,vy:0,life:0.25,size:hz.r,col:'rgba(180,90,255,.4)',ring:true});}
      else burst(hz.x,hz.y,4,hz.col);
      if(hz.fromE){ // 敌方AOE：伤害玩家
        if(dist(P.x,P.y,hz.x,hz.y)<hz.r+P.r)damagePlayer(hz.dmg,hz.x,hz.y,null);
      }else for(const e of enemies){
        if(e.dead)continue;
        if(dist(e.x,e.y,hz.x,hz.y)<hz.r+e.r)dmgEnemy(e,hz.dmg,{tags:hz.tags,col:hz.col});
      }
    }
    if(hz.done)hz.life-=dt;
  }
  hazards=hazards.filter(h=>!(h.done&&h.life<=0));
  if(state!=='play')return; // 本帧已死亡：禁止拾取/交互/升级把 over 覆盖回 cards
  // 拾取
  for(const k of pickups){
    k.vx*=Math.pow(0.001,dt);k.vy*=Math.pow(0.001,dt);
    k.x+=k.vx*dt;k.y+=k.vy*dt;
    const d=dist(k.x,k.y,P.x,P.y);
    if(d<pickR()){const a=Math.atan2(P.y-k.y,P.x-k.x);k.x+=Math.cos(a)*160*dt;k.y+=Math.sin(a)*160*dt;}
    if(d<8){
      k.dead=true;
      if(k.t==='xp'){giveXp(k.v);SFX.xp();}
      else if(k.t==='coin'){run.coins+=k.v;SFX.coin();}
      else if(k.t==='heart')heal(1);
    }
  }
  pickups=pickups.filter(k=>!k.dead);
  // 粒子
  for(const p of parts){p.life-=dt;p.x+=(p.vx||0)*dt;p.y+=(p.vy||0)*dt;}
  parts=parts.filter(p=>p.life>0);
  for(const t of texts){t.life-=dt;t.y-=22*dt;}
  texts=texts.filter(t=>t.life>0);
  if(banner){banner.t-=dt;if(banner.t<=0)banner=null;}
  // 交互
  const it=nearestInteract();
  if(it&&pressed.KeyE)doInteract(it);
  // 升级触发
  if(run.pending>0){
    state='cards';offer=genOffer();hoverCard=-1;
    P.charge=-1;mouse.down=false;
  }
  // 相机
  cam.x=lerp(cam.x,clamp(P.x-VW/2,0,MW*T-VW),Math.min(1,dt*8));
  cam.y=lerp(cam.y,clamp(P.y-VH/2,0,MH*T-VH),Math.min(1,dt*8));
  shake=Math.max(0,shake-dt*22);
}
function updateSwords(dt){
  const want=tc('F1')?1+tc('F2'):0;
  while(swords.length<want)swords.push({ang:rnd(0,TAU),st:'orbit',x:player.x,y:player.y,cd:rnd(0.3,1),bounced:false,tgt:null});
  while(swords.length>want)swords.pop();
  const spdM=1+0.3*tc('F3');
  for(const s of swords){
    if(s.st==='orbit'){
      s.ang+=dt*2.4*spdM;
      s.x=player.x+Math.cos(s.ang)*17;s.y=player.y+Math.sin(s.ang)*17;
      s.cd-=dt;
      if(s.cd<=0){
        let best=null,bd=115;
        for(const e of enemies)if(!e.dead&&!e.barrel){const d=dist(s.x,s.y,e.x,e.y);if(d<bd){bd=d;best=e;}}
        if(best){s.st='fly';s.tgt=best;s.bounced=false;}
      }
    }else if(s.st==='fly'){
      const t=s.tgt;
      if(!t||t.dead){s.st='back';continue;}
      const d=dist(s.x,s.y,t.x,t.y)||1;
      s.x+=(t.x-s.x)/d*230*spdM*dt;s.y+=(t.y-s.y)/d*230*spdM*dt;
      if(d<t.r+4){
        dmgEnemy(t,1+tc('F4')+run.shopDmg,{col:'#bfe0ff',kx:(t.x-player.x)*3,ky:(t.y-player.y)*3,melee:false});
        SFX.hit();
        if(tc('F5')&&!s.bounced){
          s.bounced=true;
          let nb=null,nd=95;
          for(const e of enemies)if(!e.dead&&!e.barrel&&e!==t){const dd=dist(s.x,s.y,e.x,e.y);if(dd<nd){nd=dd;nb=e;}}
          if(nb){s.tgt=nb;continue;}
        }
        s.st='back';
      }
    }else{
      const hx=player.x+Math.cos(s.ang)*17,hy=player.y+Math.sin(s.ang)*17;
      const d=dist(s.x,s.y,hx,hy)||1;
      s.x+=(hx-s.x)/d*260*dt;s.y+=(hy-s.y)/d*260*dt;
      if(d<6){s.st='orbit';s.cd=1.5/spdM;}
    }
  }
}
function updateFireOrbs(dt){
  const want=tc('P2');
  while(fireOrbs.length<want)fireOrbs.push({off:rnd(0,TAU),alive:true,re:0});
  while(fireOrbs.length>want)fireOrbs.pop();
  fireOrbs.forEach((o,i)=>{
    o.ang=gtime*2+i*(TAU/fireOrbs.length)+o.off;
    o.x=player.x+Math.cos(o.ang)*23;o.y=player.y+Math.sin(o.ang)*23;
    if(!o.alive){o.re-=dt;if(o.re<=0)o.alive=true;return;}
    for(const e of enemies){
      if(e.dead)continue;
      if(dist(o.x,o.y,e.x,e.y)<e.r+5){
        explodeAt(o.x,o.y,1+run.shopDmg,16);
        o.alive=false;o.re=3;break;
      }
    }
  });
}

/* ================= 渲染 ================= */
function draw(){
  ctx.setTransform(SCALE,0,0,SCALE,0,0);
  ctx.fillStyle='#0a0812';ctx.fillRect(0,0,VW,VH);
  if(state==='title'){drawTitle();present();return;}
  const sx=(Math.random()*2-1)*shake,sy=(Math.random()*2-1)*shake;
  ctx.save();
  ctx.translate(-Math.round(cam.x)+sx,-Math.round(cam.y)+sy);
  drawWorld();
  ctx.restore();
  drawUI();
  if(state==='cards')drawCards();
  if(state==='over')drawEnd('深入第 '+run.floor+' 层','#ff5060','最深纪录 '+run.maxFloor+' 层 · 按 R 或点击 重新挑战');
  if(state==='win')drawEnd('通 关 ！','#ffe066','按 R 或点击 再来一局');
  present();
}
function present(){}
function drawWorld(){
  const pal=FLOOR_PAL[(run.floor-1)%FLOOR_PAL.length];
  const x0=Math.max(0,cam.x/T|0),y0=Math.max(0,cam.y/T|0);
  const x1=Math.min(MW-1,(cam.x+VW)/T+1|0),y1=Math.min(MH-1,(cam.y+VH)/T+1|0);
  for(let y=y0;y<=y1;y++)for(let x=x0;x<=x1;x++){
    const t=map[y*MW+x],px=x*T,py=y*T;
    if(t===1){
      ctx.fillStyle=h2(x,y)<0.12?pal.flD:pal.fl;
      ctx.fillRect(px,py,T,T);
      if(h2(x*3,y*7)<0.05){ctx.fillStyle=pal.flD;ctx.fillRect(px+4,py+6,3,1);}
    }else{
      ctx.fillStyle=pal.wa;ctx.fillRect(px,py,T,T);
      if(y+1<MH&&map[(y+1)*MW+x]===1){ctx.fillStyle=pal.waF;ctx.fillRect(px,py+6,T,T-6);ctx.fillStyle=pal.waE;ctx.fillRect(px,py+4,T,2);}
    }
  }
  // 楼梯
  if(stairsObj){
    const s=stairsObj;
    ctx.fillStyle='#060409';ctx.fillRect(s.x-8,s.y-8,16,16);
    ctx.fillStyle='#4a4258';ctx.fillRect(s.x-6,s.y-6,12,3);
    ctx.fillStyle='#39324a';ctx.fillRect(s.x-5,s.y-2,10,3);
    ctx.fillStyle='#292338';ctx.fillRect(s.x-4,s.y+2,8,3);
    ctx.fillStyle='rgba(255,224,102,'+(0.25+0.15*Math.sin(gtime*3))+')';
    ctx.fillRect(s.x-9,s.y-9,18,1);ctx.fillRect(s.x-9,s.y+8,18,1);
  }
  // 宝箱/商店
  for(const c of chests)ctx.drawImage(c.open?sprChestO:sprChest,c.x-7,c.y-6);
  for(const p of pedestals){
    ctx.fillStyle='#3a3148';ctx.fillRect(p.x-6,p.y-2,12,6);
    ctx.fillStyle='#4a4058';ctx.fillRect(p.x-5,p.y-4,10,3);
    if(!p.sold){
      ctx.font='8px monospace';ctx.textAlign='center';
      ctx.fillStyle='#ffe066';ctx.fillText(p.item.glyph,p.x,p.y-8+Math.sin(gtime*2.5)*1.5);
      ctx.fillStyle='#c8b880';ctx.fillText(p.item.price+'金',p.x,p.y+13);
    }
  }
  // 锁门红光
  if(lockRoom){
    const R=lockRoom;
    ctx.strokeStyle='rgba(255,70,80,'+(0.5+0.3*Math.sin(gtime*6))+')';
    ctx.lineWidth=2;
    ctx.strokeRect(R.x*T+1,R.y*T+1,R.w*T-2,R.h*T-2);
  }
  // 地面危害
  for(const hz of hazards){
    if(!hz.done){
      ctx.strokeStyle=hz.col;ctx.globalAlpha=0.5+0.3*Math.sin(gtime*10);
      ctx.beginPath();ctx.arc(hz.x,hz.y,hz.r,0,TAU);ctx.stroke();ctx.globalAlpha=1;
    }else if(hz.kind==='ice'){
      ctx.fillStyle='rgba(160,220,255,'+(hz.life*1.4)+')';
      ctx.beginPath();ctx.arc(hz.x,hz.y,hz.r*0.8,0,TAU);ctx.fill();
    }
  }
  // 暴风雪
  if(blizzard){
    ctx.strokeStyle='rgba(160,220,255,.4)';
    ctx.beginPath();ctx.arc(player.x,player.y,62,0,TAU);ctx.stroke();
    for(let i=0;i<3;i++){
      const a=gtime*5+i*2.1;
      ctx.fillStyle='rgba(200,240,255,.6)';
      ctx.fillRect(player.x+Math.cos(a)*rnd(10,60),player.y+Math.sin(a)*rnd(10,60),2,2);
    }
  }
  // 拾取物
  for(const k of pickups){
    if(k.t==='xp')ctx.drawImage(sprOrb,k.x-2,k.y-2+Math.sin(gtime*4+k.x)*1.5);
    else if(k.t==='coin')ctx.drawImage(sprCoin,k.x-3,k.y-3+Math.sin(gtime*4+k.x)*1.5);
    else ctx.drawImage(sprHeart,k.x-3,k.y-3+Math.sin(gtime*3+k.x)*1.5);
  }
  // 敌人（按y排序）
  const sorted=enemies.slice().sort((a,b)=>a.y-b.y);
  for(const e of sorted)drawEnemy(e);
  // 玩家
  drawPlayer();
  // 飞剑
  for(const s of swords){
    ctx.save();ctx.translate(s.x,s.y);
    const ra=s.st==='orbit'?s.ang+PI/2:Math.atan2((s.tgt?s.tgt.y:player.y)-s.y,(s.tgt?s.tgt.x:player.x)-s.x);
    ctx.rotate(ra);
    ctx.fillStyle='#cfe4f5';ctx.fillRect(-1,-5,2,8);
    ctx.fillStyle='#8aa8c0';ctx.fillRect(-2,2,4,2);
    ctx.restore();
  }
  // 环火
  for(const o of fireOrbs){
    if(!o.alive)continue;
    ctx.fillStyle='rgba(255,140,50,.3)';ctx.beginPath();ctx.arc(o.x,o.y,6,0,TAU);ctx.fill();
    ctx.fillStyle='#ff9040';ctx.beginPath();ctx.arc(o.x,o.y,3,0,TAU);ctx.fill();
    ctx.fillStyle='#ffe0a0';ctx.fillRect(o.x-1,o.y-1,2,2);
  }
  // 弹幕
  for(const p of projs){
    if(p.type==='arrow'||p.type==='earrow'){
      ctx.strokeStyle=p.type==='arrow'?'#d8e8c8':'#c8b8a0';
      ctx.lineWidth=1.5;
      const a=Math.atan2(p.vy,p.vx);
      ctx.beginPath();ctx.moveTo(p.x-Math.cos(a)*4,p.y-Math.sin(a)*4);ctx.lineTo(p.x+Math.cos(a)*4,p.y+Math.sin(a)*4);ctx.stroke();

      ctx.fillStyle='rgba(255,140,50,.35)';ctx.beginPath();ctx.arc(p.x,p.y,7,0,TAU);ctx.fill();
      ctx.fillStyle='#ff8030';ctx.beginPath();ctx.arc(p.x,p.y,4,0,TAU);ctx.fill();
      ctx.fillStyle='#ffe0a0';ctx.fillRect(p.x-1,p.y-1,2,2);
      if(Math.random()<0.5)parts.push({x:p.x,y:p.y,vx:rnd(-15,15),vy:rnd(-15,15),life:0.25,size:1.5,col:'#ff9040'});
    }else if(p.type==='arcane'){
      ctx.fillStyle='rgba(110,190,255,.4)';ctx.beginPath();ctx.arc(p.x,p.y,5,0,TAU);ctx.fill();
      ctx.fillStyle='#8ad0ff';ctx.beginPath();ctx.arc(p.x,p.y,2.5,0,TAU);ctx.fill();
    }else if(p.type==='bolt'){
      ctx.fillStyle='rgba(255,80,140,.4)';ctx.beginPath();ctx.arc(p.x,p.y,4.5,0,TAU);ctx.fill();
      ctx.fillStyle='#ff5080';ctx.beginPath();ctx.arc(p.x,p.y,2.5,0,TAU);ctx.fill();
    }else if(p.type==='slash'){
      const a=Math.atan2(p.vy,p.vx);
      ctx.strokeStyle='rgba(170,225,255,.9)';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(p.x,p.y,7,a-0.9,a+0.9);ctx.stroke();
      ctx.strokeStyle='rgba(230,245,255,.45)';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(p.x-Math.cos(a)*3,p.y-Math.sin(a)*3,6,a-0.8,a+0.8);ctx.stroke();
    }else if(p.type==='shock'){
      ctx.strokeStyle='rgba(224,180,110,.8)';ctx.lineWidth=2;
      const a=Math.atan2(p.vy,p.vx);
      ctx.beginPath();ctx.arc(p.x,p.y,7,a-1,a+1);ctx.stroke();
      ctx.strokeStyle='rgba(180,140,80,.5)';
      ctx.beginPath();ctx.arc(p.x,p.y,4,a-1.2,a+1.2);ctx.stroke();
    }
  }
  // 挥击弧——扇形刀光（渐隐填充 + 亮边）
  if(swing){
    const k=swing.t/swing.dur;
    const a0=swing.dir-swing.wide/2,a1=swing.dir-swing.wide/2+swing.wide*k;
    const rr=swing.rng-2;
    ctx.save();
    ctx.globalAlpha=(0.5-k*0.4);
    ctx.fillStyle=swing.col;
    ctx.beginPath();ctx.moveTo(player.x,player.y);
    ctx.arc(player.x,player.y,rr,a0,a1);ctx.closePath();ctx.fill();
    ctx.globalAlpha=0.95-k*0.6;
    ctx.strokeStyle='#ffffff';ctx.lineWidth=run.weapon==='hammer'?3:1.5;
    ctx.beginPath();ctx.arc(player.x,player.y,rr,a0,a1);ctx.stroke();
    ctx.restore();
  }
  // 粒子
  for(const p of parts){
    if(p.ring){
      ctx.strokeStyle=p.col;ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(p.x,p.y,p.size*(1.3-p.life*2),0,TAU);ctx.stroke();
    }else if(p.streak){ // 火花：沿速度方向的短拖痕
      ctx.strokeStyle=p.col;ctx.globalAlpha=Math.min(1,p.life*5);ctx.lineWidth=p.size;
      const vl=Math.hypot(p.vx,p.vy)||1,ux=p.vx/vl,uy=p.vy/vl;
      ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x-ux*p.size*2.5,p.y-uy*p.size*2.5);ctx.stroke();
      ctx.globalAlpha=1;
    }else{
      ctx.fillStyle=p.col;ctx.globalAlpha=Math.min(1,p.life*3);
      ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
      ctx.globalAlpha=1;
    }
  }
  // 伤害数字（大伤害放大）
  ctx.textAlign='center';
  for(const t of texts){
    ctx.globalAlpha=Math.min(1,t.life*2.5);
    const fs=Math.round(7*(t.sc||1)*(1+(1-t.life)*0.15));
    ctx.font='bold '+fs+'px monospace';
    ctx.fillStyle='#000';ctx.fillText(t.txt,t.x+1,t.y+1);
    ctx.fillStyle=t.col;ctx.fillText(t.txt,t.x,t.y);
    ctx.globalAlpha=1;
  }
  // 光照渐晕
  const g=ctx.createRadialGradient(player.x,player.y,60,player.x,player.y,210);
  g.addColorStop(0,'rgba(5,3,10,0)');g.addColorStop(1,'rgba(5,3,10,.88)');
  ctx.fillStyle=g;
  ctx.fillRect(cam.x-20,cam.y-20,VW+40,VH+40);
}
function drawEnemy(e){
  const spr=e.spr;
  const sq=e.type==='slime'||e.boss&&e.ai==='slimeking'?1+Math.sin(e.wa||gtime*3)*0.12:1;
  ctx.save();
  ctx.translate(e.x,e.y-(e.z||0));
  if(e.type==='ghost'||e.ai==='lich')ctx.globalAlpha=0.65+0.2*Math.sin(gtime*3);
  if(e.frozen>0)ctx.globalAlpha=0.8;
  const w=spr.width,h=spr.height;
  const sc=e.boss?2:1;
  ctx.scale(sc,sc*sq);
  ctx.drawImage(spr,-w/2,-h+4);
  ctx.restore();
  if(e.flash>0){
    ctx.fillStyle='rgba(255,255,255,'+e.flash*5+')';
    ctx.beginPath();ctx.arc(e.x,e.y-(e.z||0)-3,e.r+2,0,TAU);ctx.fill();
  }
  if(e.frozen>0){
    ctx.fillStyle='rgba(140,220,255,.35)';
    ctx.beginPath();ctx.arc(e.x,e.y-4,e.r+3,0,TAU);ctx.fill();
  }
  if(e.stun>0){
    ctx.font='7px monospace';ctx.fillStyle='#ffe066';ctx.textAlign='center';
    ctx.fillText('✦',e.x+Math.sin(gtime*8)*3,e.y-e.r-8);
  }
  if(e.slowT>0&&!e.frozen){
    ctx.fillStyle='rgba(140,220,255,.7)';
    ctx.fillRect(e.x-2,e.y+3,1.5,1.5);ctx.fillRect(e.x+1,e.y+4,1.5,1.5);
  }
  if(e.burnT>0){
    ctx.fillStyle='#ff8030';
    ctx.fillRect(e.x+rnd(-3,3),e.y-8+rnd(-2,2),1.5,2);
  }
  if(e.poisonT>0){
    ctx.fillStyle='#70d050';
    ctx.fillRect(e.x+rnd(-3,3),e.y-9,1.5,1.5);
  }
  // 小怪血条
  if(!e.boss&&e.hp<e.maxhp){
    ctx.fillStyle='#201826';ctx.fillRect(e.x-6,e.y-e.r-7,12,2);
    ctx.fillStyle='#e34a5a';ctx.fillRect(e.x-6,e.y-e.r-7,12*e.hp/e.maxhp,2);
  }
}
function drawPlayer(){
  const P=player;
  if(P.inv>0&&Math.sin(gtime*40)>0)return;
  ctx.save();
  ctx.translate(P.x,P.y);
  if(P.stealth>0)ctx.globalAlpha=0.35;
  if(P.roll>0)ctx.rotate(Math.sin((0.18-P.roll)/0.18*PI)*0.5*P.face);
  const bob=Math.abs(Math.sin(P.walk))*1.2;
  ctx.scale(P.face,1);
  ctx.drawImage(sprPlayer,-6,-14+4-bob);
  ctx.restore();
  // 手持武器指示
  const a=P.aim;
  if(run.weapon==='ranger'&&P.sub==='bow'){
    ctx.strokeStyle='#8ade7a';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(P.x+Math.cos(a)*8,P.y+Math.sin(a)*8,4,a-1.1,a+1.1);ctx.stroke();
    if(P.charge>=0){
      ctx.fillStyle='#201826';ctx.fillRect(P.x-8,P.y+8,16,2);
      ctx.fillStyle=P.charge>=1?'#ffe066':'#8ade7a';
      ctx.fillRect(P.x-8,P.y+8,16*P.charge,2);
    }
  }else if(run.weapon==='mage'){
    ctx.strokeStyle='#8a6a4a';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(P.x,P.y);ctx.lineTo(P.x+Math.cos(a)*9,P.y+Math.sin(a)*9);ctx.stroke();
    const oc=tc('I1')?'#9fe0ff':'#ff9040';
    ctx.fillStyle=oc;ctx.beginPath();ctx.arc(P.x+Math.cos(a)*10,P.y+Math.sin(a)*10,1.8,0,TAU);ctx.fill();
  }
  if(P.blocking){
    ctx.strokeStyle=tc('J5')&&P.blockT<0.25?'#ffe066':'#aab4c2';
    ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(P.x,P.y,9,a-PI*0.45,a+PI*0.45);ctx.stroke();
  }
  if(P.buffAtk>0){
    ctx.strokeStyle='rgba(255,100,80,'+(0.3+0.2*Math.sin(gtime*8))+')';
    ctx.beginPath();ctx.arc(P.x,P.y-4,8,0,TAU);ctx.stroke();
  }
}

  for(let i=0;i<P.armor;i++){ctx.drawImage(sprHeartA,hx,6);hx+=9;}

  // 小地图（按地图尺寸等比缩放）

  for(const r of rooms){
    if(!r.discovered)continue;
    const cols={start:'#4a6a9a',combat:r.cleared?'#3a3348':'#6a4a52',chest:'#9a8040',shop:'#4a7a58',boss:'#8a3040'};
    ctx.fillStyle=cols[r.type];
    ctx.fillRect(mmx+r.x*sxk,mmy+r.y*syk,Math.max(2,r.w*sxk),Math.max(2,r.h*syk));
  }
  ctx.fillStyle='#fff';
  ctx.fillRect(mmx+player.x/T*sxk-1,mmy+player.y/T*syk-1,2,2);
  ctx.globalAlpha=1;
  // Boss血条
  const boss=enemies.find(e=>e.boss&&!e.dead);
  if(boss){
    ctx.textAlign='center';ctx.font='bold 10px monospace';
    ctx.fillStyle='#ffb0c0';ctx.fillText(boss.name,VW/2,14);
    ctx.fillStyle='#201020';ctx.fillRect(VW/2-70,18,140,6);
    ctx.fillStyle='#e83858';ctx.fillRect(VW/2-70,18,140*boss.hp/boss.maxhp,6);
    ctx.strokeStyle='#604050';ctx.strokeRect(VW/2-70.5,17.5,141,7);

  // 交互提示
  const it=state==='play'?nearestInteract():null;
  if(it){
    ctx.textAlign='center';ctx.font='bold 9px monospace';
    ctx.fillStyle='#000';ctx.fillText(it.hint,VW/2+1,VH-25+1);

  }
  // 通告横幅
  if(banner){
    const a=clamp(banner.t,0,1);
    ctx.globalAlpha=a;
    ctx.textAlign='center';
    ctx.font='bold 16px monospace';
    ctx.fillStyle='#000';ctx.fillText(banner.txt,VW/2+1,84+1);
    ctx.fillStyle='#ffe9c0';ctx.fillText(banner.txt,VW/2,84);
    if(banner.sub){ctx.font='9px monospace';ctx.fillStyle='#c0b090';ctx.fillText(banner.sub,VW/2,98);}
    ctx.globalAlpha=1;
  }
}
function drawCards(){
  ctx.fillStyle='rgba(5,3,12,.78)';ctx.fillRect(0,0,VW,VH);
  ctx.textAlign='center';
  ctx.font='bold 15px monospace';
  ctx.fillStyle='#ffe066';ctx.fillText('✦ 升级！选择一项天赋 ✦',VW/2,52);
  ctx.font='9px monospace';ctx.fillStyle='#8a8098';
  ctx.fillText('剩余选择次数：'+run.pending+'   (点击卡片 或 按 1/2/3)',VW/2,66);
  const cw=98,chh=116,gap=12;
  const total=offer.length*cw+(offer.length-1)*gap;
  hoverCard=-1;
  offer.forEach((t,i)=>{
    const x=VW/2-total/2+i*(cw+gap),y=94;

    ctx.lineWidth=hov?2:1;
    ctx.fillRect(x,y,cw,chh);ctx.strokeRect(x+0.5,y+0.5,cw-1,chh-1);
    let ty=y+14;
    if(t.key){ctx.font='7px monospace';ctx.fillStyle='#ffd040';ctx.fillText('★ 键石',x+cw/2,ty);ty+=2;}
    ctx.font='bold 11px monospace';ctx.fillStyle='#f0e8ff';
    ctx.fillText(t.name,x+cw/2,ty+14);
    if(t.max>1&&t.id!=='GOLD'){
      ctx.font='7px monospace';ctx.fillStyle='#7a7090';
      ctx.fillText('Lv '+tc(t.id)+' / '+t.max,x+cw/2,ty+25);
    }
    // 描述换行
    ctx.font='8px monospace';ctx.fillStyle='#b8b0c8';
    const chars=t.desc.split('');let line='',ly=ty+40;
    for(const ch of chars){
      line+=ch;
      if(ctx.measureText(line).width>cw-12){ctx.fillText(line,x+cw/2,ly);line='';ly+=11;}
    }
    if(line)ctx.fillText(line,x+cw/2,ly);
    ctx.font='bold 9px monospace';ctx.fillStyle='#5a5070';
    ctx.fillText(''+(i+1),x+cw/2,y+chh-7);
  });
}
function pickCard(i){
  if(!offer||i<0||i>=offer.length)return;
  applyTalent(offer[i]);
  run.pending--;
  if(run.pending>0){offer=genOffer();}
  else{
    offer=null;
    if(run.wonPending){state='win';SFX.win();}
    else state='play';
  }
}

  ctx.fillStyle=(gtime%1<0.6)?'#ffe066':'#806840';
  ctx.fillText('—— 点击武器卡开始冒险 ——',VW/2,VH-10);

function drawEnd(title,col,sub){
  ctx.fillStyle='rgba(5,3,12,.82)';ctx.fillRect(0,0,VW,VH);
  ctx.textAlign='center';
  ctx.font='bold 24px monospace';
  ctx.fillStyle=col;ctx.fillText(title,VW/2,120);
  ctx.font='10px monospace';ctx.fillStyle='#c0b8d0';
  ctx.fillText('等级 '+run.level+' · 击杀 '+run.kills+' · 金币 '+run.coins+' · 用时 '+Math.floor(run.time)+'秒',VW/2,148);
  const picked=Object.keys(run.talents);
  if(picked.length){
    ctx.fillStyle='#8a8098';
    let s='构筑：'+picked.map(id=>{const t=TALENTS.find(x=>x.id===id);return t?t.name+(run.talents[id]>1?'×'+run.talents[id]:''):'';}).filter(Boolean).join('  ');
    // 简单截断换行

  }
  ctx.font='bold 10px monospace';
  ctx.fillStyle=(gtime%1<0.6)?'#ffe066':'#806840';
  ctx.fillText(sub,VW/2,VH-46);
}

/* ================= 主循环 ================= */
let last=performance.now();
function frame(now){
  const dt=clamp((now-last)/1000,0,1/30);
  last=now;
  // 状态输入
  if(state==='title'){
    if(pressed.LMB&&hoverWpn>=0){
      newRun(Object.keys(WPNS)[hoverWpn]);
      mouse.down=false;
    }
  }else if(state==='cards'){
    if(pressed.LMB&&hoverCard>=0){pickCard(hoverCard);mouse.down=false;}
    if(pressed.Digit1)pickCard(0);
    if(pressed.Digit2)pickCard(1);
    if(pressed.Digit3)pickCard(2);
  }else if(state==='over'||state==='win'){
    if(pressed.KeyR||pressed.LMB){state='title';mouse.down=false;}
  }else{
    update(dt);
  }
  if(state==='cards'||state==='over'||state==='win')gtime+=dt;
  draw();
  for(const k in pressed)pressed[k]=false;
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

/* ================= 调试接口 ================= */
window.DBG={
  start:w=>newRun(w),
  state:()=>state,
  setState:s=>{state=s;},
  run:()=>run,player:()=>player,enemies:()=>enemies,rooms:()=>rooms,
  giveXp:n=>giveXp(n),
  coins:n=>{run.coins+=n;},
  learn:(id,n)=>{run.talents[id]=(run.talents[id]||0)+(n||1);},
  pick:i=>pickCard(i),
  warp:(x,y)=>{player.x=x;player.y=y;},
  warpRoom:t=>{const r=rooms.find(r=>r.type===t);if(r){lockRoom=null;player.x=(r.x+r.w/2)*T;player.y=(r.y+r.h/2)*T;}},
  killAll:()=>{for(const e of enemies)if(!e.dead){e.hp=0;killEnemy(e);}},
  god:()=>{player.maxhp=99;player.hp=99;},
};
